<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經典俄羅斯方塊 Tetris (全功能音效曲風自訂版)</title>
    <!-- 最優先載入 Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #1e1e1e;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 1.8rem;
            letter-spacing: 3px;
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
            text-align: center;
        }

        /* 三欄式橫向布局 */
        .game-container {
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 15px;
            background: #2c3e50;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            max-height: 90vh;
            box-sizing: border-box;
        }

        /* 左右兩側的資訊欄 */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 180px;
            justify-content: space-between;
        }

        /* 中間的遊戲主戰場 */
        .center-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        canvas {
            border: 4px solid #34495e;
            background-color: #111;
            display: block;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            max-height: 70vh;
            width: auto;
        }

        .box {
            background: #34495e;
            padding: 8px 10px;
            border-radius: 6px;
            text-align: center;
            box-sizing: border-box;
        }

        .box h2 {
            margin: 0 0 4px 0;
            font-size: 0.8rem;
            color: #bdc3c7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .box p {
            margin: 0;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2ecc71;
        }

        /* 排行榜樣式 */
        .leaderboard-list {
            margin: 4px 0 0 0;
            padding: 0;
            list-style: none;
            font-size: 0.8rem;
            text-align: left;
        }

        .leaderboard-list li {
            display: flex;
            justify-content: space-between;
            padding: 2px 4px;
            border-bottom: 1px dashed #4f5d73;
        }

        .leaderboard-list li:last-child {
            border: none;
        }

        .rank-gold { color: #f1c40f; font-weight: bold; }
        .rank-silver { color: #bdc3c7; font-weight: bold; }
        .rank-bronze { color: #e67e22; font-weight: bold; }

        #hold-canvas {
            background-color: #111;
            border: 2px solid #34495e;
            display: block;
            margin: 4px auto 0 auto;
        }

        .btn {
            padding: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            box-sizing: border-box;
        }

        .btn:active {
            transform: scale(0.97);
        }

        #start-btn { background-color: #e74c3c; }
        #start-btn:hover { background-color: #c0392b; }

        #pause-btn { background-color: #3498db; }
        #pause-btn:hover { background-color: #2980b9; }

        /* 自定義面板控制 */
        .key-settings-title {
            font-weight: bold;
            color: #f1c40f;
            margin-bottom: 6px;
            font-size: 0.8rem;
        }

        .key-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 3px 0;
            font-size: 0.72rem;
        }

        .key-btn {
            background: #2c3e50;
            border: 1px solid #7f8c8d;
            color: #ecf0f1;
            padding: 1px 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.68rem;
            min-width: 65px;
            text-align: center;
            transition: all 0.2s;
        }

        .key-btn:hover {
            background: #16a085;
            border-color: #1abc9c;
        }

        .key-btn.waiting {
            background: #e67e22;
            border-color: #d35400;
            animation: pulse 1s infinite;
        }

        .slider-row {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            margin: 8px 0;
            font-size: 0.72rem;
            text-align: left;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2px;
        }

        .slider-row input[type="range"], .sound-style-select {
            width: 100%;
            cursor: pointer;
            accent-color: #1abc9c;
            margin: 2px 0;
        }

        .sound-style-select {
            background: #2c3e50;
            color: #fff;
            border: 1px solid #7f8c8d;
            padding: 2px;
            font-size: 0.7rem;
            border-radius: 4px;
            outline: none;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .controls-info {
            font-size: 0.68rem;
            color: #bdc3c7;
            line-height: 1.35;
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px;
            border-radius: 4px;
        }

        .sound-control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 0.72rem;
            border-top: 1px dashed #4f5d73;
            padding-top: 5px;
        }

        .sound-control-row input[type="checkbox"] {
            cursor: pointer;
            accent-color: #1abc9c;
        }

        .sound-test-container {
            display: flex;
            gap: 4px;
            margin-top: 4px;
        }

        .sound-test-btn {
            background: #34495e;
            border: 1px dashed #f1c40f;
            color: #f1c40f;
            padding: 2px;
            font-size: 0.6rem;
            border-radius: 4px;
            cursor: pointer;
            flex: 1;
        }
        .sound-test-btn:hover {
            background: #f1c40f;
            color: #34495e;
        }
    </style>
</head>
<body>

    <h1>TETRIS</h1>

    <div class="game-container">
        
        <!-- ⬅️ 左側面板 (玩家資訊、保留區、靈敏度、操作指引與進階音效控制) -->
        <div class="side-panel">
            <div class="box">
                <h2>目前玩家</h2>
                <p id="player-name-display" style="color: #f1c40f; font-size: 1rem; cursor: pointer;" onclick="changeUsername()">未登入 (點此修改)</p>
            </div>

            <div class="box">
                <h2>保留</h2>
                <canvas id="hold-canvas" width="80" height="80"></canvas>
            </div>

            <!-- ⚙️ 靈敏度設定面板 -->
            <div class="box">
                <div class="key-settings-title">⚙️ 靈敏度設定</div>
                <div class="slider-row">
                    <div class="slider-header">
                        <span>滑動延遲 (DAS)</span>
                        <span id="das-val" style="color: #1abc9c; font-weight: bold;">170ms</span>
                    </div>
                    <input type="range" id="das-slider" min="80" max="300" step="10" value="170" oninput="updateSensitivity('das', this.value)">
                </div>
                <div class="slider-row">
                    <div class="slider-header">
                        <span>滑動速度 (ARR)</span>
                        <span id="arr-val" style="color: #1abc9c; font-weight: bold;">35ms</span>
                    </div>
                    <input type="range" id="arr-slider" min="10" max="100" step="5" value="35" oninput="updateSensitivity('arr', this.value)">
                </div>
            </div>

            <div class="controls-info">
                <strong style="color: #f1c40f;">🎵 音效風格設定：</strong>
                <select id="sound-style-select" class="sound-style-select" onchange="changeSoundStyle(this.value)">
                    <option value="classic">經典 8-Bit 電子</option>
                    <option value="cyber">科技未來感</option>
                    <option value="bass">沉穩重低音</option>
                    <option value="space">太空雷射</option>
                </select>

                <div class="sound-control-row">
                    <span>啟用音效</span>
                    <input type="checkbox" id="sound-toggle" checked onchange="toggleSoundSetting(this.checked)">
                </div>
                <div class="sound-test-container">
                    <button class="sound-test-btn" onclick="playDropSound()">🔊 試聽落地</button>
                    <button class="sound-test-btn" onclick="playClearSound()">✨ 試聽消除</button>
                </div>
            </div>
        </div>

        <!-- ⏹️ 中間面板 (俄羅斯方塊主畫面、控制按鈕) -->
        <div class="center-panel">
            <canvas id="tetris" width="300" height="600"></canvas>
            
            <div style="display: flex; gap: 8px; width: 100%;">
                <button id="start-btn" class="btn" onclick="startGame()">開始遊戲</button>
                <button id="pause-btn" class="btn" onclick="togglePause()">暫停 (P)</button>
            </div>
        </div>

        <!-- ➡️ 右側面板 (分數、按鍵設定、排行榜) -->
        <div class="side-panel">
            <div class="box">
                <h2>分數</h2>
                <p id="score">0</p>
            </div>

            <!-- ⌨️ 鍵盤自定義面板 -->
            <div class="box">
                <div class="key-settings-title">⌨️ 按鍵綁定</div>
                <div class="key-row"><span>左移動</span><button class="key-btn" id="set-left" onclick="startKeyBinding('left')">載入中</button></div>
                <div class="key-row"><span>右移動</span><button class="key-btn" id="set-right" onclick="startKeyBinding('right')">載入中</button></div>
                <div class="key-row"><span>加速落</span><button class="key-btn" id="set-down" onclick="startKeyBinding('down')">載入中</button></div>
                <div class="key-row"><span>順轉</span><button class="key-btn" id="set-rotateCW" onclick="startKeyBinding('rotateCW')">載入中</button></div>
                <div class="key-row"><span>逆轉</span><button class="key-btn" id="set-rotateCCW" onclick="startKeyBinding('rotateCCW')">載入中</button></div>
                <div class="key-row"><span>瞬落</span><button class="key-btn" id="set-hardDrop" onclick="startKeyBinding('hardDrop')">載入中</button></div>
                <div class="key-row"><span>保留</span><button class="key-btn" id="set-hold" onclick="startKeyBinding('hold')">載入中</button></div>
            </div>

            <div class="box" style="flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between;">
                <h2>🏆 線上排行榜 (Top 5)</h2>
                <ul id="leaderboard" class="leaderboard-list" style="flex-grow: 1;">
                    <li>連線中...</li>
                </ul>
            </div>
        </div>

    </div>

    <script>
        // Supabase 連線資訊
        const supabaseUrl = 'https://tevslrifouvgajmogozf.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRldnNscmlmb3V2Z2FqbW9nb3pmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxODE2OTcsImV4cCI6MjA5OTc1NzY5N30.8W0yZlzcIlEXpphDXecGN9HMMUIOZqJEwc5AAcO5vVg';

        let supabaseClient;
        if (typeof supabase !== 'undefined') {
            supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        } else if (typeof window.supabase !== 'undefined') {
            supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        }

        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const holdCanvas = document.getElementById('hold-canvas');
        const holdContext = holdCanvas.getContext('2d');
        
        const scoreElement = document.getElementById('score');
        const pauseBtn = document.getElementById('pause-btn');
        const nameDisplay = document.getElementById('player-name-display');
        const leaderboardElement = document.getElementById('leaderboard');

        context.scale(30, 30);
        holdContext.scale(20, 20);

        const arena = createMatrix(10, 20);
        const pieces = 'ILJOTSZ';
        const colors = [
            null,
            '#00f0f0', '#0000f0', '#f0a000', '#f0f000', '#00f000', '#a000f0', '#f00000'
        ];

        const ghostColors = [
            null,
            'rgba(0, 240, 240, 0.25)', 'rgba(0, 0, 240, 0.25)', 'rgba(240, 160, 0, 0.25)', 
            'rgba(240, 240, 0, 0.25)', 'rgba(0, 240, 0, 0.25)', 'rgba(160, 0, 240, 0.25)', 'rgba(240, 0, 0, 0.25)'
        ];

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            type: null,
            score: 0,
            lines: 0,
            username: 'Guest'
        };

        let holdPieceType = null; 
        let hasHeldThisTurn = false;
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let gameOver = false;
        let gameRunning = false;
        let isPaused = false;

        let DAS = 170; 
        let ARR = 35;  

        let keysPressed = {};
        let moveTimers = {
            left: { first: null, repeat: null },
            right: { first: null, repeat: null },
            down: { first: null, repeat: null }
        };

        let keyConfigs = {
            left: 'ArrowLeft',
            right: 'ArrowRight',
            down: 'ArrowDown',
            rotateCW: 'ArrowUp',
            rotateCCW: 'x',
            hardDrop: ' ',
            hold: 'z'
        };

        let activeBindingAction = null; 

        // --- 🎵 頂級晶片合成音效引擎配置 ---
        let audioCtx = null;
        let soundEnabled = true;
        let soundStyle = 'classic'; // 預設曲風

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function loadSoundSetting() {
            const savedSound = localStorage.getItem('tetris_sound_enabled');
            if (savedSound !== null) {
                soundEnabled = (savedSound === 'true');
                document.getElementById('sound-toggle').checked = soundEnabled;
            }
            const savedStyle = localStorage.getItem('tetris_sound_style');
            if (savedStyle !== null) {
                soundStyle = savedStyle;
                document.getElementById('sound-style-select').value = soundStyle;
            }
        }

        function toggleSoundSetting(enabled) {
            soundEnabled = enabled;
            localStorage.setItem('tetris_sound_enabled', enabled);
        }

        function changeSoundStyle(style) {
            soundStyle = style;
            localStorage.setItem('tetris_sound_style', style);
            playClearSound(); // 切換風格時試聽消除音效
        }

        // 🟢 1. 方塊落地音效合成器
        function playDropSound() {
            if (!soundEnabled) return;
            try {
                initAudio();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                if (soundStyle === 'classic') {
                    osc.type = 'square'; // 復古方波
                    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                } else if (soundStyle === 'cyber') {
                    osc.type = 'sine'; // 乾淨正弦波
                    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                } else if (soundStyle === 'bass') {
                    osc.type = 'triangle'; // 三角波重低音
                    osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                } else if (soundStyle === 'space') {
                    osc.type = 'sawtooth'; // 鋸齒波
                    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.12);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                }

                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } catch (e) {}
        }

        // 🔵 2. 消除行數音效合成器 (雙音階/和弦上升感)
        function playClearSound() {
            if (!soundEnabled) return;
            try {
                initAudio();
                let osc1 = audioCtx.createOscillator();
                let osc2 = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                
                osc1.connect(gain);
                osc2.connect(gain);
                gain.connect(audioCtx.destination);

                if (soundStyle === 'classic') {
                    osc1.type = 'square'; osc2.type = 'square';
                    // 經典紅白機雙音階效果 523Hz(C5) -> 784Hz(G5)
                    osc1.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                    osc1.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.08);
                    osc2.frequency.setValueAtTime(659.25, audioCtx.currentTime); // E5
                    osc2.frequency.setValueAtTime(987.77, audioCtx.currentTime + 0.08); // B5
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                } else if (soundStyle === 'cyber') {
                    osc1.type = 'sine'; osc2.type = 'sine';
                    osc1.frequency.setValueAtTime(600, audioCtx.currentTime);
                    osc1.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
                    osc2.frequency.setValueAtTime(800, audioCtx.currentTime);
                    osc2.frequency.exponentialRampToValueAtTime(1600, audioCtx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                } else if (soundStyle === 'bass') {
                    osc1.type = 'triangle'; osc2.type = 'sine';
                    osc1.frequency.setValueAtTime(220, audioCtx.currentTime);
                    osc1.frequency.linearRampToValueAtTime(440, audioCtx.currentTime + 0.25);
                    osc2.frequency.setValueAtTime(330, audioCtx.currentTime);
                    osc2.frequency.linearRampToValueAtTime(660, audioCtx.currentTime + 0.25);
                    gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
                } else if (soundStyle === 'space') {
                    osc1.type = 'sawtooth'; osc2.type = 'sawtooth';
                    osc1.frequency.setValueAtTime(300, audioCtx.currentTime);
                    osc1.frequency.linearRampToValueAtTime(1500, audioCtx.currentTime + 0.18);
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                }

                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
                osc1.start(); osc2.start();
                osc1.stop(audioCtx.currentTime + 0.25); osc2.stop(audioCtx.currentTime + 0.25);
            } catch (e) {}
        }

        loadKeyConfigs();
        loadSensitivity();
        loadSoundSetting();
        updateKeyButtonsUI();

        function loadKeyConfigs() {
            const savedConfigs = localStorage.getItem('tetris_key_configs');
            if (savedConfigs) {
                try { keyConfigs = JSON.parse(savedConfigs); } catch(e) {}
            }
        }

        function loadSensitivity() {
            const savedDAS = localStorage.getItem('tetris_das');
            const savedARR = localStorage.getItem('tetris_arr');
            if (savedDAS) {
                DAS = parseInt(savedDAS);
                document.getElementById('das-slider').value = DAS;
                document.getElementById('das-val').innerText = DAS + 'ms';
            }
            if (savedARR) {
                ARR = parseInt(savedARR);
                document.getElementById('arr-slider').value = ARR;
                document.getElementById('arr-val').innerText = ARR + 'ms';
            }
        }

        function updateSensitivity(type, value) {
            const val = parseInt(value);
            if (type === 'das') {
                DAS = val; document.getElementById('das-val').innerText = val + 'ms';
                localStorage.setItem('tetris_das', val);
            } else if (type === 'arr') {
                ARR = val; document.getElementById('arr-val').innerText = val + 'ms';
                localStorage.setItem('tetris_arr', val);
            }
        }

        function updateKeyButtonsUI() {
            for (let action in keyConfigs) {
                const btn = document.getElementById(`set-${action}`);
                if (btn) {
                    let keyName = keyConfigs[action];
                    if (keyName === ' ') keyName = 'Space';
                    else if (keyName.startsWith('Arrow')) keyName = keyName.replace('Arrow', '方向鍵');
                    btn.innerText = keyName.toUpperCase();
                }
            }
        }

        function startKeyBinding(action) {
            if (activeBindingAction) {
                document.getElementById(`set-${activeBindingAction}`).classList.remove('waiting');
            }
            activeBindingAction = action;
            const btn = document.getElementById(`set-${action}`);
            btn.classList.add('waiting');
            btn.innerText = '按按鍵...';
        }

        initPlayerAndLeaderboard();

        function initPlayerAndLeaderboard() {
            let savedName = localStorage.getItem('tetris_username');
            if (!savedName) {
                savedName = prompt('請輸入您的玩家名稱：', 'Guest') || 'Guest';
                localStorage.setItem('tetris_username', savedName);
            }
            player.username = savedName;
            nameDisplay.innerText = player.username;
            renderLeaderboard();
        }

        function changeUsername() {
            const newName = prompt('請輸入新的玩家名稱：', player.username);
            if (newName && newName.trim() !== '') {
                player.username = newName.trim();
                localStorage.setItem('tetris_username', player.username);
                nameDisplay.innerText = player.username;
            }
        }

        async function renderLeaderboard() {
            if (!supabaseClient) return;
            try {
                const { data, error } = await supabaseClient
                    .from('leaderboard')
                    .select('name, score')
                    .order('score', { ascending: false })
                    .limit(5);
                if (error) throw error;
                leaderboardElement.innerHTML = '';
                for (let i = 0; i < 5; i++) {
                    const li = document.createElement('li');
                    if (data && data[i]) {
                        let rankClass = '';
                        if (i === 0) rankClass = 'class="rank-gold"';
                        else if (i === 1) rankClass = 'class="rank-silver"';
                        else if (i === 2) rankClass = 'class="rank-bronze"';
                        li.innerHTML = `<span ${rankClass}>${i+1}. ${data[i].name}</span> <span>${data[i].score}</span>`;
                    } else {
                        li.innerHTML = `<span style="color: #5d6d7e">${i+1}. ---</span> <span style="color: #5d6d7e">0</span>`;
                    }
                    leaderboardElement.appendChild(li);
                }
            } catch (err) {
                leaderboardElement.innerHTML = '<li style="color: red;">載入失敗</li>';
            }
        }

        async function saveScoreToLeaderboard() {
            if (!supabaseClient) return;
            try {
                const { error } = await supabaseClient
                    .from('leaderboard')
                    .insert([{ name: player.username, score: player.score }]);
                if (error) throw error;
                renderLeaderboard();
            } catch (err) {}
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) { matrix.push(new Array(w).fill(0)); }
            return matrix;
        }

        function createPiece(type) {
            if (type === 'T') return [[0, 0, 0], [1, 1, 1], [0, 1, 0]];
            if (type === 'O') return [[2, 2], [2, 2]];
            if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
            if (type === 'J') return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
            if (type === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
        }

        function getGhostY() {
            let ghostY = player.pos.y;
            while (!collide(arena, { pos: { x: player.pos.x, y: ghostY + 1 }, matrix: player.matrix })) { ghostY++; }
            return ghostY;
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(context, arena, {x: 0, y: 0});
            if (gameRunning && !gameOver && !isPaused && player.matrix) {
                const ghostY = getGhostY();
                drawMatrix(context, player.matrix, { x: player.pos.x, y: ghostY }, true);
            }
            drawMatrix(context, player.matrix, player.pos);
            drawHold();
        }

        function drawMatrix(ctx, matrix, offset, isGhost = false) {
            if (!matrix) return;
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        if (isGhost) {
                            ctx.fillStyle = ghostColors[value];
                            ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                            ctx.lineWidth = 0.05;
                            ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                        } else {
                            ctx.fillStyle = colors[value];
                            ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                            ctx.strokeStyle = '#202020';
                            ctx.lineWidth = 0.05;
                            ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                        }
                    }
                });
            });
        }

        function drawHold() {
            holdContext.fillStyle = '#111';
            holdContext.fillRect(0, 0, holdCanvas.width, holdCanvas.height);
            if (holdPieceType) {
                const tempMatrix = createPiece(holdPieceType);
                const offsetX = (4 - tempMatrix[0].length) / 2;
                const offsetY = (4 - tempMatrix.length) / 2;
                drawMatrix(holdContext, tempMatrix, {x: offsetX, y: offsetY});
            }
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) { arena[y + player.pos.y][x + player.pos.x] = value; }
                });
            });
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) { return true; }
                }
            }
            return false;
        }

        function arenaSweep() {
            let rowCount = 1;
            let clearedLines = 0; // 紀錄本次消除了幾行
            
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                player.lines += 1;
                rowCount *= 2;
                clearedLines++;
            }

            // 🎵 如果有消除行數，觸發消除音效；如果只是普通著地，則觸發落地音效
            if (clearedLines > 0) {
                playClearSound();
            } else {
                playDropSound();
            }
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                arenaSweep(); // 這裡面會智能判斷播落地音效或消除音效
                playerReset();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerHardDrop() {
            while (!collide(arena, player)) { player.pos.y++; }
            player.pos.y--;
            merge(arena, player);
            arenaSweep(); // 這裡面會智能判斷播落地音效或消除音效
            playerReset();
            updateScore();
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
                return false;
            }
            return true;
        }

        function playerReset() {
            const randomType = pieces[pieces.length * Math.random() | 0];
            player.matrix = createPiece(randomType);
            player.type = randomType;
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            hasHeldThisTurn = false;

            if (collide(arena, player)) {
                saveScoreToLeaderboard();
                arena.forEach(row => row.fill(0));
                gameOver = true;
                gameRunning = false;
                clearAllMoveTimers();
                alert(`遊戲結束！\n${player.username} 的最終得分為：${player.score}`);
                document.getElementById('start-btn').innerText = '再玩一次';
            }
        }

        function playerHold() {
            if (hasHeldThisTurn) return;
            const currentType = player.type;
            if (holdPieceType === null) {
                holdPieceType = currentType;
                playerReset();
            } else {
                const temp = holdPieceType;
                holdPieceType = currentType;
                player.type = temp;
                player.matrix = createPiece(temp);
                player.pos.y = 0;
                player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            }
            hasHeldThisTurn = true;
            draw();
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) { [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]]; }
            }
            if (dir > 0) { matrix.forEach(row => row.reverse()); } else { matrix.reverse(); }
        }

        function updateScore() { scoreElement.innerText = player.score; }

        function togglePause() {
            if (!gameRunning && !gameOver) return;
            isPaused = !isPaused;
            if (isPaused) {
                pauseBtn.innerText = '繼續 (P)';
                pauseBtn.style.backgroundColor = '#27ae60';
                clearAllMoveTimers();
            } else {
                pauseBtn.innerText = '暫停 (P)';
                pauseBtn.style.backgroundColor = '#3498db';
                lastTime = performance.now();
                update();
            }
        }

        function update(time = 0) {
            if (!gameRunning || isPaused) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) { playerDrop(); }
            draw();
            requestAnimationFrame(update);
        }

        function handleKeyAction(action, actionType) {
            if (!gameRunning || isPaused) return;
            if (actionType === 'down') {
                if (action === 'left') {
                    playerMove(-1); draw();
                    moveTimers.left.first = setTimeout(() => { moveTimers.left.repeat = setInterval(() => { playerMove(-1); draw(); }, ARR); }, DAS);
                } else if (action === 'right') {
                    playerMove(1); draw();
                    moveTimers.right.first = setTimeout(() => { moveTimers.right.repeat = setInterval(() => { playerMove(1); draw(); }, ARR); }, DAS);
                } else if (action === 'down') {
                    playerDrop(); draw();
                    moveTimers.down.repeat = setInterval(() => { playerDrop(); draw(); }, 50);
                }
            } else if (actionType === 'up') {
                if (action === 'left') { clearTimeout(moveTimers.left.first); clearInterval(moveTimers.left.repeat); }
                else if (action === 'right') { clearTimeout(moveTimers.right.first); clearInterval(moveTimers.right.repeat); }
                else if (action === 'down') { clearInterval(moveTimers.down.repeat); }
            }
        }

        function clearAllMoveTimers() {
            clearTimeout(moveTimers.left.first); clearInterval(moveTimers.left.repeat);
            clearTimeout(moveTimers.right.first); clearInterval(moveTimers.right.repeat);
            clearInterval(moveTimers.down.repeat);
            keysPressed = {};
        }

        document.addEventListener('keydown', event => {
            if (activeBindingAction) {
                event.preventDefault();
                const pressedKey = event.key;
                if (pressedKey === 'Escape') {
                    document.getElementById(`set-${activeBindingAction}`).classList.remove('waiting');
                    updateKeyButtonsUI(); activeBindingAction = null; return;
                }
                keyConfigs[activeBindingAction] = pressedKey;
                localStorage.setItem('tetris_key_configs', JSON.stringify(keyConfigs));
                document.getElementById(`set-${activeBindingAction}`).classList.remove('waiting');
                updateKeyButtonsUI(); activeBindingAction = null; return;
            }

            if (soundEnabled) { initAudio(); }

            if (event.key === 'p' || event.key === 'P') { togglePause(); return; }
            if (!gameRunning || isPaused) return;
            if (keysPressed[event.key]) return;
            keysPressed[event.key] = true;

            let currentAction = null;
            for (let action in keyConfigs) { if (keyConfigs[action] === event.key) { currentAction = action; break; } }
            if (!currentAction) return;

            if (currentAction === 'left' || currentAction === 'right' || currentAction === 'down') {
                event.preventDefault(); handleKeyAction(currentAction, 'down');
            } else if (currentAction === 'rotateCW') {
                event.preventDefault(); playerRotate(1); draw();
            } else if (currentAction === 'rotateCCW') {
                event.preventDefault(); playerRotate(-1); draw();
            } else if (currentAction === 'hardDrop') {
                event.preventDefault(); playerHardDrop(); draw();
            } else if (currentAction === 'hold') {
                event.preventDefault(); playerHold();
            }
        });

        document.addEventListener('keyup', event => {
            keysPressed[event.key] = false;
            let currentAction = null;
            for (let action in keyConfigs) { if (keyConfigs[action] === event.key) { currentAction = action; break; } }
            if (currentAction === 'left' || currentAction === 'right' || currentAction === 'down') { handleKeyAction(currentAction, 'up'); }
        });

        function startGame() {
            if (soundEnabled) {
                initAudio();
                if (audioCtx && audioCtx.state === 'suspended') { audioCtx.resume(); }
            }
            if (gameOver || !gameRunning) {
                arena.forEach(row => row.fill(0));
                player.score = 0; player.lines = 0; holdPieceType = null; hasHeldThisTurn = false; updateScore();
                if (!player.username || player.username === 'Guest') { changeUsername(); }
                playerReset(); gameOver = false; gameRunning = true; isPaused = false;
                pauseBtn.innerText = '暫停 (P)'; pauseBtn.style.backgroundColor = '#3498db';
                lastTime = performance.now(); update();
                document.getElementById('start-btn').innerText = '重新開始';
            }
        }
    </script>
</body>
</html>
