<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經典俄羅斯方塊 Tetris (Supabase 線上排行版)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #202020;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            letter-spacing: 2px;
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }

        .game-container {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            background: #2c3e50;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        canvas {
            border: 4px solid #34495e;
            background-color: #111;
            display: block;
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 160px;
        }

        .box {
            background: #34495e;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .box h2 {
            margin: 0 0 5px 0;
            font-size: 0.85rem;
            color: #bdc3c7;
            text-transform: uppercase;
        }

        .box p {
            margin: 0;
            font-size: 1.3rem;
            font-weight: bold;
            color: #2ecc71;
        }

        /* 排行榜樣式 */
        .leaderboard-list {
            margin: 5px 0 0 0;
            padding: 0;
            list-style: none;
            font-size: 0.85rem;
            text-align: left;
        }

        .leaderboard-list li {
            display: flex;
            justify-content: space-between;
            padding: 3px 5px;
            border-bottom: 1px dashed #4f5d73;
        }

        .leaderboard-list li:last-child {
            border: none;
        }

        .rank-gold { color: #f1c40f; font-weight: bold; }
        .rank-silver { color: #bdc3c7; font-weight: bold; }
        .rank-bronze { color: #e67e22; font-weight: bold; }

        #hold-canvas {
            background-color: #111;
            border: 2px solid #34495e;
            display: block;
            margin: 5px auto 0 auto;
        }

        .btn {
            padding: 10px;
            font-size: 0.95rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        #start-btn { background-color: #e74c3c; }
        #start-btn:hover { background-color: #c0392b; }

        #pause-btn { background-color: #3498db; }
        #pause-btn:hover { background-color: #2980b9; }

        .controls-info {
            font-size: 0.75rem;
            color: #95a5a6;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h1 id="game-title">TETRIS</h1>

    <div class="game-container">
        <canvas id="tetris" width="300" height="600"></canvas>

        <div class="info-panel">
            <div class="box">
                <h2>目前玩家</h2>
                <p id="player-name-display" style="color: #f1c40f; font-size: 1.1rem; cursor: pointer;" onclick="changeUsername()">未登入 (點此修改)</p>
            </div>

            <div class="box">
                <h2>保留 (Z)</h2>
                <canvas id="hold-canvas" width="80" height="80"></canvas>
            </div>
            
            <div class="box">
                <h2>分數</h2>
                <p id="score">0</p>
            </div>

            <div class="box">
                <h2>🏆 線上排行榜 (Top 5)</h2>
                <ul id="leaderboard" class="leaderboard-list">
                    <li>連線中...</li>
                </ul>
            </div>

            <button id="start-btn" class="btn" onclick="startGame()">開始遊戲</button>
            <button id="pause-btn" class="btn" onclick="togglePause()">暫停 (P)</button>
            
            <div class="controls-info">
                <strong>操作說明：</strong><br>
                ⬅️ / ➡️ : 左右移動<br>
                ⬇️ : 加速下落<br>
                ⬆️ : 旋轉方塊<br>
                Space : 瞬間落地<br>
                <strong>Z : 保留 / 切換方塊</strong><br>
                <strong>P : 暫停 / 繼續</strong>
            </div>
        </div>
    </div>

    <script>
        // 2. 填寫正確的 Supabase 連線資訊（已自動移除網址尾端 /rest/v1/ 與修正金鑰單引號）
        const SUPABASE_URL = 'https://tevslrifouvgajmogozf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRldnNscmlmb3V2Z2FqbW9nb3pmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxODE2OTcsImV4cCI6MjA5OTc1NzY5N30.8W0yZlzcIlEXpphDXecGN9HMMUIOZqJEwc5AAcO5vVg';

        // 安全初始化 Supabase，防止套件載入延遲
      let supabaseClient;
        if (typeof supabase !== 'undefined') {
            supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        } else if (typeof window.supabase !== 'undefined') {
            supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        } else {
            console.error("Supabase SDK 載入失敗，請檢查網路連線。");
        }

        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const holdCanvas = document.getElementById('hold-canvas');
        const holdContext = holdCanvas.getContext('2d');
        
        const scoreElement = document.getElementById('score');
        const pauseBtn = document.getElementById('pause-btn');
        const nameDisplay = document.getElementById('player-name-display');
        const leaderboardElement = document.getElementById('leaderboard');

        context.scale(30, 30);
        holdContext.scale(20, 20);

        const arena = createMatrix(10, 20);
        const pieces = 'ILJOTSZ';
        const colors = [
            null,
            '#00f0f0', '#0000f0', '#f0a000', '#f0f000', '#00f000', '#a000f0', '#f00000'
        ];

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            type: null,
            score: 0,
            lines: 0,
            username: 'Guest'
        };

        let holdPieceType = null; 
        let hasHeldThisTurn = false;
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let gameOver = false;
        let gameRunning = false;
        let isPaused = false;

        // 初始化
        initPlayerAndLeaderboard();

        function initPlayerAndLeaderboard() {
            let savedName = localStorage.getItem('tetris_username');
            if (!savedName) {
                savedName = prompt('請輸入您的玩家名稱：', 'Guest') || 'Guest';
                localStorage.setItem('tetris_username', savedName);
            }
            player.username = savedName;
            nameDisplay.innerText = player.username;

            // 載入線上排行榜
            renderLeaderboard();
        }

        function changeUsername() {
            const newName = prompt('請輸入新的玩家名稱：', player.username);
            if (newName && newName.trim() !== '') {
                player.username = newName.trim();
                localStorage.setItem('tetris_username', player.username);
                nameDisplay.innerText = player.username;
            }
        }

        // 🌟 獲取線上排行榜 (Top 5)
        async function renderLeaderboard() {
            if (!supabaseClient) return;
            try {
                const { data, error } = await supabaseClient
                    .from('leaderboard')
                    .select('name, score')
                    .order('score', { ascending: false })
                    .limit(5);

                if (error) throw error;

                leaderboardElement.innerHTML = '';
                for (let i = 0; i < 5; i++) {
                    const li = document.createElement('li');
                    if (data && data[i]) {
                        let rankClass = '';
                        if (i === 0) rankClass = 'class="rank-gold"';
                        else if (i === 1) rankClass = 'class="rank-silver"';
                        else if (i === 2) rankClass = 'class="rank-bronze"';

                        li.innerHTML = `<span ${rankClass}>${i+1}. ${data[i].name}</span> <span>${data[i].score}</span>`;
                    } else {
                        li.innerHTML = `<span style="color: #5d6d7e">${i+1}. ---</span> <span style="color: #5d6d7e">0</span>`;
                    }
                    leaderboardElement.appendChild(li);
                }
            } catch (err) {
                console.error('無法載入線上排行榜:', err);
                leaderboardElement.innerHTML = '<li style="color: red;">載入失敗</li>';
            }
        }

        // 🌟 上傳玩家分數至雲端
        async function saveScoreToLeaderboard() {
            if (!supabaseClient) return;
            try {
                const { error } = await supabaseClient
                    .from('leaderboard')
                    .insert([{ name: player.username, score: player.score }]);

                if (error) throw error;
                
                // 重新載入最新排行
                renderLeaderboard();
            } catch (err) {
                console.error('上傳分數失敗:', err);
            }
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        function createPiece(type) {
            if (type === 'T') return [[0, 0, 0], [1, 1, 1], [0, 1, 0]];
            if (type === 'O') return [[2, 2], [2, 2]];
            if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
            if (type === 'J') return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
            if (type === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(context, arena, {x: 0, y: 0});
            drawMatrix(context, player.matrix, player.pos);
            drawHold();
        }

        function drawMatrix(ctx, matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        ctx.strokeStyle = '#202020';
                        ctx.lineWidth = 0.05;
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function drawHold() {
            holdContext.fillStyle = '#111';
            holdContext.fillRect(0, 0, holdCanvas.width, holdCanvas.height);
            if (holdPieceType) {
                const tempMatrix = createPiece(holdPieceType);
                const offsetX = (4 - tempMatrix[0].length) / 2;
                const offsetY = (4 - tempMatrix.length) / 2;
                drawMatrix(holdContext, tempMatrix, {x: offsetX, y: offsetY});
            }
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] &&
                        arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                player.lines += 1;
                rowCount *= 2;
            }
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerHardDrop() {
            while (!collide(arena, player)) {
                player.pos.y++;
            }
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function playerReset() {
            const randomType = pieces[pieces.length * Math.random() | 0];
            player.matrix = createPiece(randomType);
            player.type = randomType;
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            hasHeldThisTurn = false;

            if (collide(arena, player)) {
                // 儲存至 Supabase 雲端排行榜
                saveScoreToLeaderboard();
                
                arena.forEach(row => row.fill(0));
                gameOver = true;
                gameRunning = false;
                alert(`遊戲結束！\n${player.username} 的最終得分為：${player.score}`);
                document.getElementById('start-btn').innerText = '再玩一次';
            }
        }

        function playerHold() {
            if (hasHeldThisTurn) return;
            const currentType = player.type;
            if (holdPieceType === null) {
                holdPieceType = currentType;
                playerReset();
            } else {
                const temp = holdPieceType;
                holdPieceType = currentType;
                player.type = temp;
                player.matrix = createPiece(temp);
                player.pos.y = 0;
                player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            }
            hasHeldThisTurn = true;
            draw();
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function updateScore() {
            scoreElement.innerText = player.score;
        }

        function togglePause() {
            if (!gameRunning && !gameOver) return;
            isPaused = !isPaused;
            if (isPaused) {
                pauseBtn.innerText = '繼續 (P)';
                pauseBtn.style.backgroundColor = '#27ae60';
            } else {
                pauseBtn.innerText = '暫停 (P)';
                pauseBtn.style.backgroundColor = '#3498db';
                lastTime = performance.now();
                update();
            }
        }

        function update(time = 0) {
            if (!gameRunning || isPaused) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }
            draw();
            requestAnimationFrame(update);
        }

        document.addEventListener('keydown', event => {
            if (event.key === 'p' || event.key === 'P') {
                togglePause();
                return;
            }
            if (!gameRunning || isPaused) return;
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 38) playerRotate(1);
            else if (event.key === ' ') {
                event.preventDefault(); 
                playerHardDrop();
            } else if (event.key === 'z' || event.key === 'Z') {
                playerHold();
            }
        });

        function startGame() {
            if (gameOver || !gameRunning) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                player.lines = 0;
                holdPieceType = null;
                hasHeldThisTurn = false;
                updateScore();
                
                if (!player.username || player.username === 'Guest') {
                    changeUsername();
                }
                
                playerReset();
                gameOver = false;
                gameRunning = true;
                isPaused = false;
                pauseBtn.innerText = '暫停 (P)';
                pauseBtn.style.backgroundColor = '#3498db';
                lastTime = performance.now();
                update();
                document.getElementById('start-btn').innerText = '重新開始';
            }
        }
    </script>
</body>
</html>
