<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經典俄羅斯方塊 Tetris (升級版)</title>
    <style>
        body {
            background-color: #202020;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            letter-spacing: 2px;
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }

        .game-container {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            background: #2c3e50;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        canvas {
            border: 4px solid #34495e;
            background-color: #111;
            display: block;
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 140px;
        }

        .box {
            background: #34495e;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
        }

        .box h2 {
            margin: 0 0 5px 0;
            font-size: 0.85rem;
            color: #bdc3c7;
            text-transform: uppercase;
        }

        .box p {
            margin: 0;
            font-size: 1.4rem;
            font-weight: bold;
            color: #2ecc71;
        }

        /* 暫存方塊顯示區 */
        #hold-canvas {
            background-color: #111;
            border: 2px solid #34495e;
            display: block;
            margin: 5px auto 0 auto;
        }

        .btn {
            padding: 10px;
            font-size: 0.95rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        #start-btn {
            background-color: #e74c3c;
        }
        #start-btn:hover {
            background-color: #c0392b;
        }

        #pause-btn {
            background-color: #3498db;
        }
        #pause-btn:hover {
            background-color: #2980b9;
        }

        .controls-info {
            font-size: 0.75rem;
            color: #95a5a6;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h1>TETRIS</h1>

    <div class="game-container">
        <canvas id="tetris" width="300" height="600"></canvas>

        <div class="info-panel">
            <div class="box">
                <h2>保留方塊 (Z)</h2>
                <canvas id="hold-canvas" width="80" height="80"></canvas>
            </div>
            
            <div class="box">
                <h2>分數</h2>
                <p id="score">0</p>
            </div>
            
            <div class="box">
                <h2>消行數</h2>
                <p id="lines">0</p>
            </div>

            <button id="start-btn" class="btn" onclick="startGame()">開始遊戲</button>
            <button id="pause-btn" class="btn" onclick="togglePause()">暫停 (P)</button>
            
            <div class="controls-info">
                <strong>操作說明：</strong><br>
                ⬅️ / ➡️ : 左右移動<br>
                ⬇️ : 加速下落<br>
                ⬆️ : 旋轉方塊<br>
                Space : 瞬間落地<br>
                <strong>Z : 保留 / 切換方塊</strong><br>
                <strong>P : 暫停 / 繼續</strong>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const holdCanvas = document.getElementById('hold-canvas');
        const holdContext = holdCanvas.getContext('2d');
        
        const scoreElement = document.getElementById('score');
        const linesElement = document.getElementById('lines');
        const pauseBtn = document.getElementById('pause-btn');

        // 縮放主畫面與保留畫面
        context.scale(30, 30);
        holdContext.scale(20, 20); // 讓保留區的方塊看起來小一點

        const arena = createMatrix(10, 20);
        const pieces = 'ILJOTSZ';
        const colors = [
            null,
            '#00f0f0', // I
            '#0000f0', // J
            '#f0a000', // L
            '#f0f000', // O
            '#00f000', // S
            '#a000f0', // T
            '#f00000'  // Z
        ];

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            type: null, // 記錄當前方塊種類
            score: 0,
            lines: 0
        };

        // 保留方塊相關變數
        let holdPieceType = null; 
        let hasHeldThisTurn = false; // 每回合限制只能換一次

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let gameOver = false;
        let gameRunning = false;
        let isPaused = false;

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        function createPiece(type) {
            if (type === 'T') {
                return [
                    [0, 0, 0],
                    [1, 1, 1],
                    [0, 1, 0],
                ];
            } else if (type === 'O') {
                return [
                    [2, 2],
                    [2, 2],
                ];
            } else if (type === 'L') {
                return [
                    [0, 3, 0],
                    [0, 3, 0],
                    [0, 3, 3],
                ];
            } else if (type === 'J') {
                return [
                    [0, 4, 0],
                    [0, 4, 0],
                    [4, 4, 0],
                ];
            } else if (type === 'I') {
                return [
                    [0, 5, 0, 0],
                    [0, 5, 0, 0],
                    [0, 5, 0, 0],
                    [0, 5, 0, 0],
                ];
            } else if (type === 'S') {
                return [
                    [0, 6, 6],
                    [6, 6, 0],
                    [0, 0, 0],
                ];
            } else if (type === 'Z') {
                return [
                    [7, 7, 0],
                    [0, 7, 7],
                    [0, 0, 0],
                ];
            }
        }

        function draw() {
            // 繪製主畫面
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(context, arena, {x: 0, y: 0});
            drawMatrix(context, player.matrix, player.pos);

            // 繪製暫存畫面
            drawHold();
        }

        function drawMatrix(ctx, matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        ctx.strokeStyle = '#202020';
                        ctx.lineWidth = 0.05;
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        // 繪製保留區的方塊
        function drawHold() {
            holdContext.fillStyle = '#111';
            holdContext.fillRect(0, 0, holdCanvas.width, holdCanvas.height);

            if (holdPieceType) {
                const tempMatrix = createPiece(holdPieceType);
                // 居中對齊計算
                const offsetX = (4 - tempMatrix[0].length) / 2;
                const offsetY = (4 - tempMatrix.length) / 2;
                drawMatrix(holdContext, tempMatrix, {x: offsetX, y: offsetY});
            }
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] &&
                        arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                player.lines += 1;
                rowCount *= 2;
            }
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerHardDrop() {
            while (!collide(arena, player)) {
                player.pos.y++;
            }
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function playerReset() {
            const randomType = pieces[pieces.length * Math.random() | 0];
            player.matrix = createPiece(randomType);
            player.type = randomType; // 記錄當前方塊種類
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            hasHeldThisTurn = false; // 新回合重置保留功能

            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                gameOver = true;
                gameRunning = false;
                alert('遊戲結束！最終得分：' + player.score);
                document.getElementById('start-btn').innerText = '再玩一次';
            }
        }

        // 🌟 新增功能：保留 (Hold) 方塊 (鍵盤 Z)
        function playerHold() {
            if (hasHeldThisTurn) return; // 每回合只能保留一次

            const currentType = player.type;

            if (holdPieceType === null) {
                // 如果保留區是空的，將當前方塊存入，並生成新方塊
                holdPieceType = currentType;
                playerReset();
            } else {
                // 如果保留區已經有方塊，進行交換
                const temp = holdPieceType;
                holdPieceType = currentType;
                player.type = temp;
                player.matrix = createPiece(temp);
                player.pos.y = 0;
                player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            }

            hasHeldThisTurn = true;
            draw();
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [
                        matrix[x][y],
                        matrix[y][x],
                    ] = [
                        matrix[y][x],
                        matrix[x][y],
                    ];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        function updateScore() {
            scoreElement.innerText = player.score;
            linesElement.innerText = player.lines;
        }

        // 🌟 新增功能：暫停切換
        function togglePause() {
            if (!gameRunning && !gameOver) return; // 沒在玩時點擊無效

            isPaused = !isPaused;
            if (isPaused) {
                pauseBtn.innerText = '繼續 (P)';
                pauseBtn.style.backgroundColor = '#27ae60';
            } else {
                pauseBtn.innerText = '暫停 (P)';
                pauseBtn.style.backgroundColor = '#3498db';
                // 恢復時重新校正時間，防止方塊瞬間落地
                lastTime = performance.now();
                update();
            }
        }

        function update(time = 0) {
            if (!gameRunning || isPaused) return;

            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            requestAnimationFrame(update);
        }

        // 監聽鍵盤事件
        document.addEventListener('keydown', event => {
            // P 鍵隨時可以按 (不論是否在暫停中)
            if (event.key === 'p' || event.key === 'P') {
                togglePause();
                return;
            }

            // 如果暫停中或遊戲沒開始，其餘按鍵無效
            if (!gameRunning || isPaused) return;

            if (event.keyCode === 37) { // 左箭頭
                playerMove(-1);
            } else if (event.keyCode === 39) { // 右箭頭
                playerMove(1);
            } else if (event.keyCode === 40) { // 下箭頭
                playerDrop();
            } else if (event.keyCode === 38) { // 上箭頭 (旋轉)
                playerRotate(1);
            } else if (event.key === ' ') { // 空白鍵 (瞬間下落)
                event.preventDefault(); 
                playerHardDrop();
            } else if (event.key === 'z' || event.key === 'Z') { // Z 鍵 (保留 / 交換)
                playerHold();
            }
        });

        function startGame() {
            if (gameOver || !gameRunning) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                player.lines = 0;
                holdPieceType = null;
                hasHeldThisTurn = false;
                updateScore();
                playerReset();
                gameOver = false;
                gameRunning = true;
                isPaused = false;
                pauseBtn.innerText = '暫停 (P)';
                pauseBtn.style.backgroundColor = '#3498db';
                lastTime = performance.now();
                update();
                document.getElementById('start-btn').innerText = '重新開始';
            }
        }
    </script>
</body>
</html>
